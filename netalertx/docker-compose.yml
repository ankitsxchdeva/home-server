services:
  netalertx:
    container_name: netalertx
    image: jokobsk/netalertx:latest
    restart: unless-stopped
    network_mode: "host"
    # New image ships python3 with file caps (cap_net_admin,cap_net_raw);
    # exec fails with EPERM unless these are in the bounding set.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      # v25+ moved app data from /app/* to /data/*
      - ./config:/data/config
      - ./db:/data/db
    environment:
      - TZ=${TZ}
    env_file:
      - .env
