services:
  matter-server:
    container_name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./data:/data
      - /run/dbus:/run/dbus:ro
    network_mode: host
    environment:
      - MATTER_SERVER__INSTANCE_PATH=/data
      - MATTER_SERVER__PORT=5580
      - MATTER_SERVER__LOG_LEVEL=info
      - TZ=America/New_York
