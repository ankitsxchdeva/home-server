- id: '1758031929542'
  alias: Sunrise Alarm Clock
  description: Slowly brighten lights to daylight by 6:30 AM, then turn off at 6:40
  triggers:
  - at: 06:00:00
    trigger: time
  actions:
  - target:
      device_id:
      - e209b58eac25e36ca86ec61c2f1c9c81
      - 937a69fc55efe9077168dd25a87a1d6d
    data:
      brightness: 1
      color_temp: 450
    action: light.turn_on
  - target:
      device_id:
      - e209b58eac25e36ca86ec61c2f1c9c81
      - 937a69fc55efe9077168dd25a87a1d6d
    data:
      brightness: 255
      color_temp: 153
      transition: 1800
    action: light.turn_on
  - delay: 00:40:00
  - target:
      device_id:
      - e209b58eac25e36ca86ec61c2f1c9c81
      - 937a69fc55efe9077168dd25a87a1d6d
    action: light.turn_off
  mode: single
