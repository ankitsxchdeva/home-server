- id: '1756658406869'
  alias: Living Room Sunset Ramp
  description: Gradually increase lights from 40% to 70% starting 1 hour before sunset
  triggers:
  - event: sunset
    offset: -01:00:00
    trigger: sun
  conditions: []
  actions:
  - data:
      brightness_pct: 60
    action: light.turn_on
    target:
      device_id:
      - f5317caddef3f9d1279526c1b64a3b4b
      - 2878198d7d2a1f0f81e4f80242284ac8
  - delay: 00:00:01
  - data:
      brightness_pct: 90
      transition: 3600
    action: light.turn_on
    target:
      device_id:
      - 2878198d7d2a1f0f81e4f80242284ac8
      - f5317caddef3f9d1279526c1b64a3b4b
  mode: single
- id: '1756658435209'
