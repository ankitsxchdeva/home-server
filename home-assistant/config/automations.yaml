- id: '1756658406869'
  alias: Evening Cozy Ramp
  description: Gradually increase living room and bedroom lights 1 hour before sunset
    with cozy bedroom tones
  triggers:
  - event: sunset
    offset: -01:00:00
    trigger: sun
  conditions: []
  actions:
  - target:
      device_id:
      - f5317caddef3f9d1279526c1b64a3b4b
      - 2878198d7d2a1f0f81e4f80242284ac8
    data:
      brightness_pct: 40
    action: light.turn_on
  - target:
      device_id:
      - e209b58eac25e36ca86ec61c2f1c9c81
      - 937a69fc55efe9077168dd25a87a1d6d
    data:
      brightness_pct: 10
      color_temp: 454
    action: light.turn_on
  - delay: 00:00:01
  - target:
      device_id:
      - f5317caddef3f9d1279526c1b64a3b4b
      - 2878198d7d2a1f0f81e4f80242284ac8
    data:
      brightness_pct: 70
      transition: 3600
    action: light.turn_on
  - target:
      device_id:
      - e209b58eac25e36ca86ec61c2f1c9c81
      - 937a69fc55efe9077168dd25a87a1d6d
    data:
      brightness_pct: 40
      transition: 3600
      color_temp: 454
    action: light.turn_on
  mode: single
