# Homepage Services Configuration
# Tiles use HTTPS subdomains served by Caddy (wildcard cert, tailnet-only).
# server/container wire each tile to docker.yaml for live status dots
# and click-to-expand CPU/mem stats. Headless services have no href.

- Home Automation:
    - Home Assistant:
        icon: home-assistant.png
        href: https://ha.ankit.casa
        description: Home automation hub
        server: pi
        container: homeassistant

    - Matter Server:
        icon: mdi-home-automation
        description: Matter/Thread controller (no web UI)
        server: pi
        container: matter-server

