services:
  caddy:
    container_name: caddy
    build: .
    restart: unless-stopped
    # host resolv.conf points at Tailscale MagicDNS, unreachable from
    # bridge containers — ACME needs working external DNS
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    networks:
      - default
