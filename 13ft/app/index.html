<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>13ft Ladder</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0f0f13;
            color: #e2e2e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header .icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 10px;
            line-height: 1;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f0f0f5;
            margin-bottom: 6px;
        }

        .card-header p {
            font-size: 0.875rem;
            color: #6b6b80;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a2a3a;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9090a8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background-color: #0f0f13;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #e2e2e8;
            font-family: inherit;
            font-size: 0.95rem;
            margin-bottom: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #44445a;
        }

        input[type="text"]:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background-color 0.2s, transform 0.1s;
        }

        input[type="submit"]:hover {
            background-color: #6d28d9;
        }

        input[type="submit"]:active {
            transform: scale(0.99);
        }

        @media (max-width: 520px) {
            .card {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-header">
            <span class="icon">🪜</span>
            <h1>13ft Ladder</h1>
            <p>Paste a paywalled URL to read the article</p>
        </div>
        <hr class="divider">
        <form action="/article" method="post">
            <label for="link">Article URL</label>
            <input
                type="text"
                id="link"
                name="link"
                placeholder="https://example.com/article"
                required
                autofocus
            >
            <input type="submit" value="Read Article">
        </form>
    </div>
</body>

</html>
